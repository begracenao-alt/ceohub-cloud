<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be Grace CEO Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">Be Grace</div>
        <div class="brand-sub">CEO Hub</div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <div class="sync-state" id="syncState">保存先：このブラウザ内</div>
      </div>
    </aside>

    <!-- メイン -->
    <main class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="メニュー">☰</button>
        <div class="topbar-title" id="topbarTitle">CEOダッシュボード</div>
        <div class="topbar-right" id="topbarDate"></div>
      </header>
      <div class="view" id="view"></div>
    <div class="bg-copyright" style="text-align:center;font-size:11px;color:#9a9a9a;opacity:.85;padding:24px 12px 28px;line-height:1.7;font-family:-apple-system,sans-serif;">無断転載・複製・転用・転売を禁じます<br>© Be Grace</div>
</main>
  </div>

  <!-- モーダル -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- トースト -->
  <div class="toast" id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/modules/dashboard.js"></script>
  <script src="js/modules/stage.js"></script>
  <script src="js/modules/money.js"></script>
  <script src="js/modules/customer.js"></script>
  <script src="js/modules/project.js"></script>
  <script src="js/modules/content.js"></script>
  <script src="js/modules/routine.js"></script>
  <script src="js/modules/sns.js"></script>
  <script src="js/modules/body.js"></script>
  <script src="js/modules/team.js"></script>
  <script src="js/modules/manual.js"></script>
  <script src="js/modules/future.js"></script>
  <script src="js/modules/diagnosis.js"></script>
  <script src="js/modules/wheel.js"></script>
  <script src="js/modules/weekly.js"></script>
  <script src="js/modules/settings.js"></script>
  <script src="js/modules/links.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
